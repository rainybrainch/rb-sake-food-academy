<style>

.lesson-wrap{padding:16px}

.manga-slot img{width:100%;display:block}
.chk-list{margin:12px 0}

.chk-item{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #30363d;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:background .15s}

.chk-label{font-size:.8rem;color:#c9d1d9}
.comp-btn{width:100%;background:linear-gradient(135deg,#F5C842,#c9a200);border:none;color:#0d1117;font-family:'Dela Gothic One',sans-serif;font-size:.95rem;padding:13px;border-radius:10px;cursor:pointer;margin-top:14px}
.comp-btn:disabled{opacity:.4;cursor:default}
.lesson-nav{display:flex;gap:8px;margin-top:10px}
.lesson-nav button{flex:1;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:9px;border-radius:8px;cursor:pointer;font-size:.78rem}
.lesson-nav button.primary{background:#F5C842;border-color:#F5C842;color:#0d1117;font-weight:bold}
.quiz-wrap{padding:16px;max-width:520px;margin:0 auto}
.quiz-q-box{font-size:.92rem;font-weight:bold;color:#e6edf3;margin-bottom:14px;line-height:1.5}
.qopt button{display:block;width:100%;text-align:left;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:10px 13px;border-radius:8px;margin-bottom:7px;cursor:pointer;font-size:.82rem;transition:border-color .15s}
.qopt button:hover{border-color:#F5C842}

.qopt button.wrong{background:#2a0d0d;border-color:#E8354A;color:#E8354A}
.q-result{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;margin-top:10px;font-size:.82rem;color:#c9d1d9;line-height:1.6;display:none}
.q-result.shown{display:block}
.q-prog{display:flex;justify-content:space-between;font-size:.72rem;color:#8b949e;margin-bottom:10px}
.score-big{text-align:center;padding:22px;background:#161b22;border:1px solid #F5C842;border-radius:12px}
.score-big .sn{font-family:'Dela Gothic One',sans-serif;font-size:2.8rem;color:#F5C842}
.score-big p{color:#8b949e;font-size:.82rem;margin-top:5px}
.next-btn{width:100%;background:#F5C842;border:none;color:#0d1117;font-weight:bold;padding:10px;border-radius:8px;cursor:pointer;margin-top:10px;font-size:.88rem}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#F5C842;color:#0d1117;padding:9px 18px;border-radius:18px;font-size:.82rem;font-weight:bold;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <button class="back-btn" id="hdrBack" onclick="goHome()" style="display:none">← ホーム</button>

<div id="s1" class="screen active">
  <div class="hero">
    <div class="hero-emoji">🍷</div>
    <h2>RBお酒と食事のアカデミー</h2>
    <p>日本酒・ワイン・ウイスキー・料理・マナーまで<br>お酒と食のすべてを体系的に学ぶ</p>

</div>

<div id="s3" class="screen">
  <div class="quiz-wrap">
    <div style="font-family:'Dela Gothic One',sans-serif;font-size:.95rem;color:#F5C842;margin-bottom:14px">🍶 お酒と食事 総合クイズ</div>
    <div id="quizWrap"></div>
  </div>
</div>

<script>
const TIPS=['日本酒の「精米歩合」とは、玄米を削って残った割合。精米歩合50%なら外側を50%削り落とした「大吟醸」レベル。削るほど雑味が減り繊細な味になる。','シャンパーニュはフランスのシャンパーニュ地方産のスパークリングワインのみ名乗れる。それ以外はスパークリングワインまたはクレマン。','ウイスキーの熟成期間が長いほど高価なのは「エンジェルズシェア（天使の分け前）」があるから。樽に入れた量の2〜4%が毎年蒸発する。','一番搾りビールは麦汁の最初の部分だけを使う。二番絞りを使わないため、雑味が少なくすっきりした味わいになる。','「マリアージュ」はフランス語で「結婚」の意味。料理とワインが互いを引き立て合う最高の組み合わせを指す。','日本酒の四合瓶（720ml）は江戸時代の1合（約180ml）×4の慣習から来ている。一升瓶は1升（1800ml）。','テキーラの原料はブルーアガベというリュウゼツランの一種。メキシコのハリスコ州周辺でのみ製造できる。','ウイスキーの「シングルモルト」は一つの蒸留所で作られたモルトウイスキーのみを使うもの。ブレンデッドは複数の蒸留所の原酒を混ぜる。','日本酒の「辛口・甘口」を示す「日本酒度」は+（プラス）が辛口、−（マイナス）が甘口。+10以上が超辛口。','ボルドーワインは赤ならカベルネ・ソーヴィニヨン主体、白なら主にソーヴィニヨン・ブランとセミヨンのブレンド。','食前酒（アペリティフ）は食欲を刺激するために飲む。シャンパン・シェリー・カンパリが代表的。食後酒（ディジェスティフ）は消化を助けるブランデー・ポートワインなど。','「ソムリエ」はフランス語でもともと「荷物を運ぶ人」という意味だった。宮廷でワインを管理する係が今のソムリエの原型。'];
let tipIdx=0;
function nextTip(){tipIdx=(tipIdx+1)%TIPS.length;document.getElementById('tipTxt').textContent=TIPS[tipIdx];}

const GENRES=[
  {id:'sake-world',emoji:'🍶',title:'お酒の世界',desc:'日本酒・ワイン・ビール・ウイスキー・カクテルを体系的に学ぶ',courses:[
    {id:'nihonshu',emoji:'🍶',title:'日本酒マスターコース',level:'入門',badgeClass:'badge-gold',desc:'純米・吟醸・大吟醸の違いから燗酒・冷酒の楽しみ方まで。日本が誇る発酵文化を深く知る',chapters:[
      {id:'ns-1',title:'日本酒の種類と特定名称酒',duration:'10分',videoUrl:null,mangaUrl:null,checkItems:['特定名称酒の8分類を言えた','精米歩合の意味を理解した','自分好みの日本酒タイプがわかった'],sections:[
        {t:'info',c:'日本酒は「米・米麹・水」だけで作られる世界屈指の発酵酒。種類を知るだけで居酒屋での注文が劇的に変わります。'},
        {t:'video',url:null,label:'📹 動画解説：日本酒の種類図解（準備中）'},
        {t:'h',c:'特定名称酒——8つのカテゴリを覚えよう'},
        {t:'txt',c:'日本酒には「特定名称酒」という8つの公式カテゴリがあります。醸造アルコールを添加するかどうかで「純米系」と「本醸造系」に大別され、さらに精米歩合と製法によって細分化されます。'},
        {t:'hl',title:'特定名称酒 早見表',items:['純米大吟醸：精米歩合50%以下・醸造アルコール無添加。最高級。フルーティで繊細','純米吟醸：精米歩合60%以下・醸造アルコール無添加。香り高くバランス良好','純米酒：精米歩合規定なし・醸造アルコール無添加。米の旨みが豊か。燗酒向き','特別純米：精米歩合60%以下か特別な製法','大吟醸：精米歩合50%以下・醸造アルコール少量添加OK。軽快でフルーティ','吟醸：精米歩合60%以下・醸造アルコール少量添加OK。華やかな香り','本醸造：精米歩合70%以下・醸造アルコール少量添加。スッキリした辛口','特別本醸造：精米歩合60%以下か特別な製法']},
        {t:'manga',url:null,label:'🎨 漫画：日本酒の種類を図解で学ぼう（準備中）'},
        {t:'prac',q:'居酒屋で「純米酒」と「純米大吟醸」が同じ価格なら、どちらを選びますか？それぞれの特徴を踏まえて答えてください。',a:'価値観次第。純米大吟醸は精米歩合50%以下まで米を削るため同量の酒を作るのに2倍以上の米が必要で通常高価。同価格なら純米大吟醸がコスパ大。ただし食中酒として飲むなら米の旨みが豊かな純米酒、香りを楽しむなら純米大吟醸が向く。'},
        {t:'glos',terms:[{term:'精米歩合',def:'玄米を削って残った割合(%)。50%なら外側を半分削った状態。雑味の元となるタンパク質・脂肪が外側に多いため、削るほど繊細でクリアな味になる。'},{term:'醸造アルコール',def:'純粋なアルコールを少量添加すること。香りを引き出す目的や低コスト化のために使われる。純米系は無添加。'}]},
        {t:'sum',c:'日本酒の種類は「純米系かどうか」「精米歩合の高さ」の2軸で整理できます。ラベルの「純米吟醸」「精米歩合55%」などの表示を確認してみましょう。',next:'次は日本酒の温度帯と楽しみ方へ'}
      ]},
      {id:'ns-2',title:'燗酒・冷酒・冷や——温度で変わる日本酒',duration:'9分',videoUrl:null,mangaUrl:null,checkItems:['燗酒と冷酒の違いを説明できる','「冷や」が常温を意味すると知った','温度別の推奨日本酒タイプを言えた'],sections:[
        {t:'info',c:'日本酒は「温度によって全く別の飲み物になる」という世界的に珍しい特性を持つ。温度の知識で日本酒の楽しさが倍増します。'},
        {t:'video',url:null,label:'📹 動画解説：燗酒の正しい温め方（準備中）'},
        {t:'h',c:'日本酒の温度帯——5℃から60℃まで'},
        {t:'txt',c:'日本酒は5℃〜60℃の広い温度帯で楽しめます。注意：「冷や」は「常温（約20℃）」を意味し、「冷えた状態（冷酒）」ではありません！居酒屋で「冷やで」と注文すると常温が来ます。'},
        {t:'hl',title:'温度別の名称と特徴',items:['雪冷え（5℃）：すっきりとした清涼感。フルーティな大吟醸向き','花冷え（10℃）：香りが立ちやすく繊細。純米吟醸に最適','涼冷え（15℃）：バランスが最も良い温度帯。熟成酒・純米酒向き','冷や（常温20℃）：日本酒本来の味を楽しむ','ぬる燗（40℃）：旨みが引き出される。純米酒が特に映える','上燗（45℃）：香りと辛みが際立つ。辛口好きに','熱燗（50℃）：ピリッとした辛みと切れ味','飛び切り燗（55〜60℃）：最も辛くキレが強い。上級者向き']},
        {t:'manga',url:null,label:'🎨 漫画：燗酒を極める職人の話（準備中）'},
        {t:'prac',q:'「同じ純米酒を冷酒（10℃）と燗酒（45℃）で飲んだら全く別の味だった」。なぜ温度で味が変わるのか科学的に説明してください。',a:'①香りの揮発性：高温ほど揮発性化合物が活発になり香りが増幅される。②旨み（アミノ酸）の感じ方：体温に近い温度で旨みを感じやすくなる。燗酒で「旨みが増す」と感じるのはこのため。③酸味の知覚：低温では酸が際立ちシャープに、高温では丸くなる傾向がある。'},
        {t:'glos',terms:[{term:'冷や（ひや）',def:'日本酒の「常温（約20℃）」を指す言葉。冷えた状態を意味しない。冷えた日本酒は「冷酒」と言う。'},{term:'ぬる燗',def:'約40℃の燗酒。人間の体温に近く旨みを最も感じやすい温度帯。純米酒や本醸造に特に向く。'}]},
        {t:'sum',c:'日本酒の温度は単なる好みではなく化学と深く関わっています。次は同じ純米酒を常温とぬる燗の2種類で飲み比べてみましょう。',next:'次はワインコースへ'}
      ]},
      {id:'ns-3',title:'日本酒の産地と蔵——地域ごとの個性',duration:'10分',videoUrl:null,mangaUrl:null,checkItems:['灘・伏見の特徴を説明できる','辛口と甘口の産地傾向を言えた','地酒選びのポイントを理解した'],sections:[
        {t:'info',c:'日本酒は産地によって個性が大きく変わります。水質・気候・米の品種が組み合わさって「地酒」の個性が生まれます。'},
        {t:'video',url:null,label:'📹 動画解説：日本酒産地マップ（準備中）'},
        {t:'h',c:'日本の主要産地と個性'},
        {t:'hl',title:'産地別の特徴',items:['灘（兵庫）：「男酒」の代名詞。硬水の宮水を使った力強い辛口。白鶴・菊正宗・沢の鶴','伏見（京都）：「女酒」の代名詞。軟水を使った上品でまろやかな甘口。月桂冠・黄桜・伏見鶴','新潟：淡麗辛口の代表産地。淡雪のような軽やかさ。越乃寒梅・久保田・八海山','山形：フルーティな吟醸香が特徴。十四代・山形正宗','秋田：旨みが豊かな酒質。出羽鶴・高清水・刈穂','広島：軟水による穏やかな甘みと旨み。酔心・賀茂鶴']},
        {t:'manga',url:null,label:'🎨 漫画：全国の蔵を旅する酒蔵探訪（準備中）'},
        {t:'prac',q:'「旅行先でその土地の日本酒を1本買いたい」というとき、どのように選ぶと良いですか？産地・水質・食の観点からアドバイスしてください。',a:'①地元の食との相性を考える：海の幸が豊かな産地（石川・新潟）なら淡麗辛口が刺身に合う。山の幸・発酵食品が豊かな産地（長野・秋田）なら旨みの強い純米酒が合う。②水質を確認：硬水の産地（灘・関西）は力強い辛口、軟水の産地（新潟・広島）は繊細な甘口になりやすい。③小さな地場蔵の「限定品」を探す：大手ではなくその土地にしかない限定流通の地酒が旅の記念になる。'},
        {t:'glos',terms:[{term:'宮水（みやみず）',def:'兵庫県西宮市に湧く硬水。カリウム・リン・マグネシウムを豊富に含み、酵母の活発な発酵を促す。灘の「男酒（辛口）」を生む名水として有名。'},{term:'淡麗辛口',def:'口当たりが軽くすっきりした辛口の酒質。新潟県の酒のスタイルとして有名。雪解け水の軟水と長い低温発酵が生む特徴的な風味。'}]},
        {t:'sum',c:'日本酒の産地は「水質×米×気候×蔵人の技」の掛け合わせ。産地名を覚えるより「なぜこの土地でこの酒が生まれたか」を理解すると記憶に残ります。',next:'日本酒ペアリング編へ'}
      ]}
    ]},
    {id:'ns-4',title:'日本酒ペアリングと四季の楽しみ方',duration:'10分',videoUrl:null,mangaUrl:null,checkItems:['日本酒に合う料理を3つ以上挙げられる','季節ごとのおすすめ日本酒スタイルを知った','燗酒を実際に試した'],sections:[
        {t:'info',c:'日本酒は「和食専用」というイメージがあるが、実は世界の料理と幅広く合わせられる。うま味（グルタミン酸）が豊富なため、塩気・脂・発酵食品との相性が特に良い。'},
        {t:'video',url:null,label:'📹 動画解説：日本酒×世界の料理ペアリング（準備中）'},
        {t:'h',c:'日本酒タイプ別ペアリング'},
        {t:'txt',c:'純米吟醸（フルーティ・軽め）: カルパッチョ・刺身・ゆず風味の料理
純米酒（米の旨み・中重め）: 焼き魚・煮物・みそ汁
本醸造（すっきり辛口）: 揚げ物・塩からい料理・餃子
古酒・熟成酒（複雑・濃厚）: チーズ・フォアグラ・デミグラスソース料理'},
        {t:'h',c:'四季の楽しみ方'},
        {t:'txt',c:'春: 花見に「うすにごり」や「新酒しぼりたて」。発泡系でフレッシュに。
夏: 冷やして「夏酒」「生酒」。酸味高め・軽快なタイプ。

冬: 燗酒。純米酒を45〜50℃（上燗）で楽しむ。旨みが開く。'},
        {t:'manga',url:null,label:'🎨 漫画：居酒屋で四季の日本酒を一年間楽しむ物語（準備中）'},
        {t:'prac',q:'「ひやおろし」とはどんな日本酒？なぜ秋に飲まれるのか？',a:'春に絞った新酒を夏の間タンクで熟成させ、秋に「火入れ（加熱殺菌）」なしで出荷した日本酒。夏を越して旨みがのり、荒さが取れてまろやかになる。秋の豊穣の食材との相性が抜群。'},
        {t:'sum',c:'日本酒は世界で最も食事に合わせやすいお酒のひとつ。まず「純米吟醸×カルパッチョ」と「燗酒×おでん」を試して、温度と食事の相性を体験してみましょう。',next:'日本酒の地方別個性編へ'}

    {id:'ns-5',title:'地方別日本酒——47都道府県のお酒文化',duration:'11分',videoUrl:null,mangaUrl:null,checkItems:['有名な日本酒産地5つを地図で言えた','水質が酒質に与える影響を説明できる','地元の酒蔵を1つ調べた'],sections:[

        {t:'video',url:null,label:'📹 動画解説：日本酒産地MAP全解説（準備中）'},
        {t:'h',c:'代表的な産地と酒質の特徴'},

        {t:'h',c:'水質と酒質の関係'},

        {t:'sum',c:'旅行で地方に行ったら必ずその地の地酒を探してみましょう。その土地の水・米・気候が凝縮された一杯が待っています。「地酒ファースト」が日本酒の旅を豊かにします。',next:'日本酒マスターコース完了！'}

    {id:'wine',emoji:'🍷',title:'ワイン入門コース',level:'入門',badgeClass:'badge-red',desc:'赤・白・ロゼ・スパークリングの基礎から産地・ぶどう品種まで。ワインが10倍楽しくなる知識',chapters:[
      {id:'wn-1',title:'ワインの基本——赤・白・品種の選び方',duration:'11分',videoUrl:null,mangaUrl:null,checkItems:['赤ワインと白ワインの製法の違いを説明できる','主要ぶどう品種を4つ以上言えた','産地で味が変わる理由を理解した'],sections:[
        {t:'info',c:'ワインは世界80カ国以上で生産される。品種・産地・製法の3軸を知るだけで、レストランのワインリストが読めるようになります。'},
        {t:'video',url:null,label:'📹 動画解説：ワインの基本を5分で（準備中）'},
        {t:'h',c:'赤・白の違いは「果皮を使うか否か」'},
        {t:'txt',c:'赤ワインは黒ブドウを果皮・種ごと発酵させるため、タンニン（渋み）とアントシアニン（赤色）が溶け込みます。白ワインは搾汁した果汁のみを発酵させるためタンニンが少なくフレッシュ。ロゼは果皮を短時間だけ漬けてピンク色を出したもの。'},
        {t:'hl',title:'知っておきたい主要ぶどう品種',items:['【赤】カベルネ・ソーヴィニヨン：濃厚・重い・渋い。ボルドーの王様。長期熟成向き','【赤】ピノ・ノワール：軽やか・エレガント・繊細。ブルゴーニュの女王','【赤】メルロー：柔らか・まろやか・プラム。初心者も飲みやすい','【赤】シラー（シラーズ）：スパイシー・力強い・ブラックペッパーの香り','【白】シャルドネ：世界最人気。産地次第で全く別物。バニラ・バター・柑橘系','【白】ソーヴィニヨン・ブラン：フレッシュ・ハーブ・柑橘。シーフードに最適','【白】リースリング：ドイツを代表。酸が高く甘みがあることも。長期熟成可']},
        {t:'manga',url:null,label:'🎨 漫画：ワイン品種を覚える近道（準備中）'},
        {t:'prac',q:'「牛ステーキ（グリル）」に合うワインを赤・白どちらかから1本選んでください。品種・理由も答えてください。',a:'赤ワインが基本。推薦：カベルネ・ソーヴィニヨンかシラー。理由：①タンニンが肉の脂肪と結合して渋みがまろやかになりながら肉の旨みを引き立てる。②牛肉の力強い風味にはボディの強い赤が負けない。③グリルのスモーキーさはシラーのスパイシーさと相性が良い。'},
        {t:'glos',terms:[{term:'タンニン',def:'赤ワインの渋みの成分。ブドウの果皮・種・茎に含まれるポリフェノール。肉料理と合わせると脂肪と結合して渋みが和らぎ食事が進む。長期熟成で丸くなる。'},{term:'テロワール',def:'ワインの「土地の味」。土壌・気候・標高・日照など産地の地理的特性が、同じ品種でも全く違う味を生み出す概念。フランス語で「大地」の意。'}]},
        {t:'sum',c:'ワイン選びの基本は「食事との重さを合わせる」「好みの渋み・甘みのレベル」の2つ。まずピノ・ノワール（軽め赤）とカベルネ（重め赤）を飲み比べてみましょう。',next:'次はウイスキーコースへ'}
      ]},
      {id:'wn-2',title:'ワインの産地——フランス・イタリア・新世界',duration:'12分',videoUrl:null,mangaUrl:null,checkItems:['ボルドーとブルゴーニュの違いを説明できる','新世界ワインのコスパが高い理由を言えた','産地で選ぶワインの選び方ができた'],sections:[
        {t:'info',c:'ワインの産地を知ると、ラベルを見るだけで「だいたいの味のイメージ」ができるようになります。旅行にも活きる知識です。'},
        {t:'video',url:null,label:'📹 動画解説：ワイン産地世界マップ（準備中）'},
        {t:'h',c:'フランス二大産地——ボルドーとブルゴーニュ'},
        {t:'txt',c:'フランスは世界最高峰のワイン産国。中でも「ボルドー（赤：カベルネ主体・力強い）」と「ブルゴーニュ（赤：ピノ・ノワール単品・繊細）」が二大産地。この2つは哲学が全く異なります：ボルドーは複数品種ブレンド、ブルゴーニュは単一品種。'},
        {t:'hl',title:'主要産地と特徴',items:['フランス・ボルドー：カベルネ主体の赤。格付けシャトー（メドック格付け）が有名。重厚・長熟','フランス・ブルゴーニュ：ピノ・ノワール単品の赤とシャルドネの白。繊細・高価・テロワール重視','イタリア・トスカーナ：サンジョヴェーゼが主体。キャンティ・バローロ・ブルネッロ・ディ・モンタルチーノ','スペイン・リオハ：テンプラニーリョ主体。コスパ良好。バニラ・スパイスの香り','チリ・アルゼンチン：「新世界」の代表。カベルネ・マルベックが主力。品質の割に手頃な価格']},
        {t:'manga',url:null,label:'🎨 漫画：フランスのシャトーを旅する（準備中）'},
        {t:'prac',q:'「予算2000円以内で、週末の自宅用に一本買いたい。濃くてしっかりした赤が好き」という相談に、産地と品種を具体的に推薦してください。',a:'推薦：チリ産カベルネ・ソーヴィニヨン（1500〜2000円台）。理由：①「濃くてしっかり」のニーズにカベルネ・ソーヴィニヨンがぴったり。②チリは日照・気温・標高の条件が良く、ボルドーに匹敵する品質を半額以下で実現できる「コスパ最強産地」。③具体的な銘柄：モンテス・アルファ・カベルネ（〜2000円）やコノスル・ビシクレタ・カベルネ（〜1000円）。もし少し予算を上げるならスペイン・リオハのテンプラニーリョも個性的で良い。'},
        {t:'glos',terms:[{term:'AOC（原産地呼称制度）',def:'フランスの産地・品種・製法を法律で保護する制度。ラベルの「AC」「AOC」「AOP」表示が品質保証の証。'},{term:'新世界（ニューワールド）',def:'チリ・アルゼンチン・オーストラリア・南アフリカ・ニュージーランド・アメリカなど、旧来のヨーロッパ以外のワイン産国。コスパ良好で初心者に入りやすい。'}]},
        {t:'sum',c:'産地を覚える一番の近道は「飲んで産地を想像すること」。次の買い物で「産地だけを見て1本選ぶ」実験をしてみましょう。',next:'ワインと食事のペアリングへ'}
      ]}
    ]},
    {id:'wn-3',title:'ワインと料理のペアリング基礎',duration:'9分',videoUrl:null,mangaUrl:null,checkItems:['白ワインに合う料理3つ言える','赤ワインに合う料理3つ言える','ペアリングの基本原則を理解した'],sections:[
        {t:'info',c:'ワインと料理のペアリングは「色を合わせる」だけが出発点。でも本当は風味の強さ・脂肪分・酸味のバランスを考えると、もっと奥深いマリアージュが生まれる。'},
        {t:'video',url:null,label:'📹 動画解説：ワインペアリングの黄金ルール（準備中）'},
        {t:'h',c:'ペアリングの基本原則'},

②産地を合わせる: イタリア料理×イタリアワイン（テロワールの共鳴）

        {t:'h',c:'ワイン別おすすめ料理'},

        {t:'manga',url:null,label:'🎨 漫画：記念日ディナーで完璧なペアリングを決める主人公（準備中）'},
        {t:'prac',q:'「テロワール（terroir）」とは何か？ペアリングにどう関係する？',a:'テロワールはフランス語で「土地の個性」。土壌・気候・地形がワインの風味に宿ること。同じ産地の料理とワインを合わせると、テロワールが共鳴して相性が良くなりやすい。'},
        {t:'sum',c:'まず「白に魚、赤に肉」から始めて、次は産地合わせを試してみましょう。イタリア料理の夜はイタリアワインを開ける——それだけで格段に食事が豊かになります。',next:'自然派ワイン編へ'}

        {t:'glos',terms:[{term:'IPA（インディア・ペールエール）',def:'ホップを大量に使用したエール。インドへの長期輸送中も品質を保つためホップを増量したのが起源。柑橘・松・花のようなアロマと強い苦みが特徴。クラフトビール界で最人気スタイル。'},{term:'タップルーム',def:'醸造所に併設されたビアバー。醸造したてのフレッシュなビールを飲める特別な場所。見学ツアーを行う醸造所も多い。'},{term:'ABV（アルコール度数）',def:'Alcohol By Volumeの略。ビールの一般的なABVは4〜8%。クラフトビールではインペリアルIPAなど10%以上になるものも。ラベルで必ず確認しよう。'}]},

        {t:'txt',c:'旨みの正体は3種類のアミノ酸・核酸：①グルタミン酸（昆布・トマト・チーズ）②イノシン酸（かつお節・煮干し・肉）③グアニル酸（干しシイタケ）。グルタミン酸＋イノシン酸を組み合わせると旨みが最大7〜8倍に増強される「相乗効果」が起きます。これが昆布＋かつおの「合わせだし」が最強な理由です。'},
        {t:'hl',title:'だしの種類と使い分け',items:['昆布だし：上品でクリアな旨み（グルタミン酸）。豆腐・精進料理に最適。沸騰させないのがポイント','かつおだし：力強い旨みと香り（イノシン酸）。味噌汁・麺つゆ・卵料理に','合わせだし（昆布＋かつお）：旨みの相乗効果で最強。おでん・茶碗蒸し・煮物に','煮干しだし：青魚の強い旨みと風味。ラーメン・味噌汁（九州・東北系）に','干しシイタケだし：グアニル酸＋グルタミン酸。中華・精進料理・炊き込みご飯に']},
        {t:'manga',url:null,label:'🎨 漫画：板前さんに聞く出汁の取り方（準備中）'},
        {t:'prac',q:'「料理に塩分を減らしながら味を濃く感じさせたい」という場合、出汁の観点からどのような工夫ができますか？',a:'旨みを増強することで塩分を減らしても「味が濃い」と感じさせられる。①良質な合わせだし（昆布＋かつお）を使って旨み成分を豊富に。②干しシイタケを加えてグアニル酸の三重相乗効果を狙う。③研究では「グルタミン酸を加えると塩分30〜40%削減でも同等の美味しさを感じられる」という結果がある。これが「減塩和食」が成立する科学的根拠。'},
        {t:'glos',terms:[{term:'グルタミン酸',def:'旨みの主要成分。昆布・トマト・パルメザンチーズ・味噌・醤油に豊富。1908年に池田菊苗博士が昆布から発見し「旨み（UMAMI）」という概念を提唱した。'},{term:'相乗効果（旨み）',def:'グルタミン酸（昆布）とイノシン酸（かつお）を組み合わせると旨みが7〜8倍に増強される現象。「一番だし」が最強な科学的理由。'}]},
        {t:'sum',c:'旨みを理解すると「昆布＋かつおの合わせだし」の偉大さが分かります。昆布だしとかつおだしを別々に作り、合わせると味がどう変わるか比較してみましょう。',next:'次はペアリング・マリアージュへ'}
      ]},
      {id:'ws-2',title:'発酵食品——醤油・味噌・酢・みりん',duration:'10分',videoUrl:null,mangaUrl:null,checkItems:['醤油の種類（濃口・薄口・白醤油）を言えた','味噌の色の違いを説明できる','本みりんと料理酒の違いを理解した'],sections:[
        {t:'info',c:'日本の調味料は「発酵の宝庫」。醤油・味噌・酢・みりん——これらを使いこなすことで日本料理の深みを出せます。'},
        {t:'video',url:null,label:'📹 動画解説：醤油と味噌の作り方（準備中）'},
        {t:'h',c:'醤油——5種類の違いを知る'},
        {t:'hl',title:'醤油の5種類',items:['濃口醤油：最も一般的。赤褐色。万能選手。日本の醤油生産量の約80%','薄口醤油：色が薄い（塩分は濃口より高い！）。素材の色を活かす料理に。関西料理に多用','たまり醤油：大豆のみで作る濃厚な醤油。刺身醤油・照り焼きのたれに','白醤油：小麦が主体で色が薄い。茶碗蒸し・出汁巻き卵に','再仕込み醤油（甘露醤油）：二度仕込み製法。濃厚で甘みがある。刺身・寿司に']},
        {t:'txt',c:'味噌は白・赤・合わせの3種類が基本。白味噌（西京味噌）は短期熟成で甘み豊か。赤味噌（八丁味噌）は長期熟成で濃厚・旨み凝縮。合わせ味噌は両者をブレンドしてバランスを取る。関西は白味噌、東海・東北は赤味噌文化が強い。'},
        {t:'manga',url:null,label:'🎨 漫画：醤油蔵見学（準備中）'},
        {t:'prac',q:'料理初心者から「スーパーで醤油を買いたいが、濃口と薄口のどちらがいいか」と聞かれました。どうアドバイスしますか？',a:'一本目なら「濃口醤油」を推薦。理由：①最も汎用性が高く煮物・炒め物・刺身醤油・漬け・ラーメンなどすべてに使える。②薄口醤油は色を薄くしたい特定の料理（お浸し・茶碗蒸し）に特化しており、塩分が濃口より高いため初心者が「薄口=薄い味」と誤解しがち。③まず濃口一本で料理に慣れてから、用途に応じて薄口を使い分けるのが合理的な順序。'},
        {t:'glos',terms:[{term:'本みりん',def:'もち米・米麹・焼酎を原料とした発酵調味料。甘み・旨み・照り・臭み消しの4役を果たす。アルコール分14%含有。「みりん風調味料」は別物で本みりんの代替にならない場合も。'},{term:'黒酢（米黒酢）',def:'長期熟成した米酢。アミノ酸が豊富でまろやかな酸味。鹿児島の壺酢が有名。酢酸・アミノ酸が豊富で健康効果も注目されている。'}]},
        {t:'sum',c:'日本の調味料「さしすせそ」（砂糖・塩・酢・醤油・味噌）は日本料理のすべての基盤。まず醤油と味噌を使い分けることから始めましょう。',next:'だし・調味料の科学編へ'}
      ]}
    ]},
    {id:'ws-3',title:'だし・調味料の科学——和食の旨みの正体',duration:'10分',videoUrl:null,mangaUrl:null,checkItems:['一番だしと二番だしの違いを説明できる','さ・し・す・せ・そを順番に言えた','うま味（グルタミン酸・イノシン酸）の意味を知った'],sections:[
        {t:'info',c:'和食が世界に誇る「うま味（UMAMI）」は1908年に池田菊苗博士が発見。昆布から抽出したグルタミン酸が「第5の味覚」として世界的に認知されている。だしはその結晶。'},
        {t:'video',url:null,label:'📹 動画解説：一番だしの取り方を実演（準備中）'},
        {t:'h',c:'うま味の3大成分'},
        {t:'txt',c:'グルタミン酸: 昆布・トマト・チーズ・発酵食品に含まれる。単体でも旨みを感じる
イノシン酸: 鰹節・煮干し・鶏肉・豚肉。グルタミン酸と組み合わせると相乗効果で旨みが7〜8倍に
グアニル酸: 干し椎茸。加熱で増加する。三つの中でも特に強い旨み'},
        {t:'h',c:'一番だしの取り方'},
        {t:'txt',c:'①水1Lに昆布10g入れて30分浸水
②中火でゆっくり加熱、60〜70℃で20分保つ（沸騰させない）
③昆布を取り出してから強火→沸騰直前に鰹節40gを入れる
④1〜2分で火を止めてそのまま2〜3分置く
⑤ペーパーで漉す→黄金の一番だし完成
※沸騰させると昆布の「ヌメリ・えぐみ」が出るので注意'},
        {t:'h',c:'さ・し・す・せ・そ——調味料を入れる順番'},
        {t:'txt',c:'さ（砂糖）: 分子が大きく浸透が遅い。最初に入れて食材に旨みを含ませる
し（塩）: 浸透圧を高めて食材の水分を引き出す
す（酢）: 揮発性。加熱し続けると酸味が飛ぶので後半に
せ（醤油）: 香りが命。最後の方に加えて香りを活かす
そ（味噌）: 加熱で香りが飛ぶ。最後に加えて火を止める'},
        {t:'manga',url:null,label:'🎨 漫画：料理下手な主人公がだしを覚えて和食に目覚める物語（準備中）'},
        {t:'prac',q:'一番だしを取るとき、なぜ昆布を沸騰させてはいけないのか？',a:'昆布は60〜70℃がグルタミン酸の最も多く溶け出す温度。沸騰（100℃）させると昆布のぬめり成分（アルギン酸）と臭み成分が溶け出し、だしが濁ってえぐみが出る。低温でじっくり抽出するのが黄金だしの秘訣。'},
        {t:'sum',c:'一番だしを自分で取ると、和食の味が劇的に変わります。最初は面倒でも、一度体験すると「だしなし料理には戻れない」と感じるはず。まず今週末、一番だしに挑戦してみましょう。',next:'和食コース完了！'}
      ]}

    {id:'french',emoji:'🥐',title:'フレンチ料理入門コース',level:'中級',badgeClass:'badge-red',desc:'ソテー・ポシェ・ブレゼ——フランス料理の基本技法と素材の使い方を学ぶ',chapters:[
      {id:'fr-1',title:'フランス料理の基本技法——加熱の仕組み',duration:'12分',videoUrl:null,mangaUrl:null,checkItems:['ソテー・ポシェ・ブレゼの違いを説明できる','ミクスチュール（マリネ等）の役割を言えた','フランス料理のソースの基本を理解した'],sections:[
        {t:'info',c:'フランス料理は「技法の体系」が世界で最も整っている料理文化。技法名を知るとレストランのメニューが読めるようになります。'},
        {t:'video',url:null,label:'📹 動画解説：フランス料理の基本技法（準備中）'},
        {t:'h',c:'フランス料理の主要加熱技法'},
        {t:'hl',title:'必須加熱技法 早見表',items:['ソテー（sauté）：高温の少量の油で炒める。外はカリッと中はジューシー。語源は「跳ぶ」。野菜・薄切り肉・魚に','ポシェ（pocher）：沸騰させない熱湯（70〜80℃）でゆっくり加熱。素材が柔らかくデリケートに仕上がる。魚・卵・鶏胸肉に','ブレゼ（braiser）：少量の水分（ワイン・ブロス等）で蓋をして蒸し煮。硬い肉がとろとろに。仔牛・豚肩ロース・根菜に','グリエ（griller）：グリル・網焼き。香ばしい焦げ目と燻製香がつく。ステーキ・魚・野菜に','ロティ（rôtir）：オーブンで丸ごと焼く。外はカリッと中はしっとり。ホールチキン・ラム・根菜に']},
        {t:'txt',c:'フランス料理のソース（sauce）は料理の完成度を決める重要な要素。「母なるソース（ソース・メール）」と呼ばれる5大基本ソース：①ベシャメル（白）②ヴルーテ（白系）③エスパニョール（茶色）④トマト⑤オランデーズ（黄色・バター乳化系）がすべてのソースの基盤になっています。'},
        {t:'manga',url:null,label:'🎨 漫画：修業中のシェフがソースを学ぶ話（準備中）'},
        {t:'prac',q:'「鶏胸肉を使って、パサつかずジューシーに仕上げたい」という場合、フランス料理のどの技法が最適ですか？理由も説明してください。',a:'ポシェ（pocher）が最適。理由：鶏胸肉は脂肪が少なく高温加熱するとすぐ水分が飛んでパサつく。ポシェは70〜80℃のゆっくりした加熱でタンパク質が徐々に凝固し、水分を閉じ込めたまま火が通る。①水・ハーブ・野菜でブイヨンを作る②70〜80℃（小さな泡が出る程度）に保つ③胸肉を入れて15〜20分ゆっくり加熱。温度計を使うと確実。仕上がった胸肉は薄くスライスして、ポシェのブイヨンを使ったソースと一緒に。'},
        {t:'glos',terms:[{term:'ミゼ・アン・プラス（mise en place）',def:'調理前に材料・道具・調味料をすべて準備・配置しておくこと。「適切な場所に置く」の意。フランス料理の基本中の基本で、段取りの良い料理の根幹。'},{term:'フォン（fond）',def:'肉や骨を長時間煮出したスープ（出汁）。フォン・ド・ボー（仔牛）・フォン・ド・ヴォライユ（鶏）等。和食の「だし」に相当する概念でソースの基盤になる。'},{term:'ルー（roux）',def:'小麦粉とバターを炒め合わせたもの。ソースのとろみ付けに使う。白いルーはベシャメル用、茶色く炒めたブランルーはエスパニョール等の濃厚なソース用。'}]},
        {t:'sum',c:'フランス料理の技法名を知ると、メニューを見るだけで「どんな調理をしているか」が分かります。ポシェとソテーは家庭でも試せる基本技法——今夜の鶏料理で試してみましょう。',next:'イタリア料理コースへ'}
      ]}
    ]},

  {q:'日本酒で「冷や」と注文すると何が来るか？',opts:['冷えた日本酒（5〜10℃）','氷を入れた日本酒','常温の日本酒（約20℃）','燗酒（45〜50℃）'],ans:2,exp:'「冷や」は常温（約20℃）の日本酒を指す。冷えた日本酒は「冷酒」と言う。この違いを知らないと居酒屋での注文で混乱する。'},
  {q:'旨み成分「グルタミン酸（昆布）」と「イノシン酸（かつお）」を組み合わせると何が起きるか？',opts:['味が打ち消し合う','旨みが7〜8倍に増強される（相乗効果）','塩味だけが残る','甘みが強くなる'],ans:1,exp:'グルタミン酸とイノシン酸の組み合わせは旨みを最大7〜8倍に増強する相乗効果を生む。これが昆布+かつおの「合わせだし」が最強な科学的理由。'},
  {q:'バーボンウイスキーの定義として正しいのはどれか？',opts:['スコットランド産の大麦モルトウイスキー','トウモロコシ51%以上使用・新しいオーク樽熟成のアメリカ産','3回蒸留したアイルランド産','日本の蒸留所で作られたウイスキー'],ans:1,exp:'バーボンはアメリカ産ウイスキーで、原料にトウモロコシを51%以上使用し、新しいオーク樽で熟成することが法律で定められている。バニラ・キャラメルの甘い香りが特徴。'},
  {q:'ペアリングの「コントラスト法則」の例として最適なのは？',opts:['赤ワインとステーキ（重さを合わせる）','白ワインとシーフード（地元ルール）','脂っこい料理と酸味の強いワイン（対比）','甘口ワインとフォアグラ（甘×甘）'],ans:2,exp:'コントラスト法則は対照的な要素で互いを引き立てる。脂っこい料理に酸味の強いワインを合わせると、酸が脂をリセットして口の中をさっぱりさせ次の一口を楽しめる。'},
  {q:'「エンジェルズシェア（天使の分け前）」とは何か？',opts:['天使に捧げるための蒸留工程','樽熟成中に蒸発するウイスキーの量','最高品質のウイスキーの称号','ブレンダーが飲んでいい分量'],ans:1,exp:'年間2〜4%が樽から蒸発する現象。長期熟成品が高価な大きな理由の一つ。10年で約20%以上が消える。'},
  {q:'フレンチのテーブルマナーでワインを受ける正しい方法は？',opts:['両手でグラスを持ち上げて受ける','片手でグラスを持ち上げて受ける','グラスはテーブルに置いたまま受ける','グラスを逆さに向けて断る'],ans:2,exp:'正式なフランス式マナーではワインはグラスをテーブルに置いたまま受ける。グラスを持ち上げるのは日本の居酒屋文化に近い習慣で、格式高いフレンチの場では避けた方が無難。'}
];

let st={};let curLesson=null;let curGenreId=null;let quizIdx=0,quizScore=0,quizAnswered=false;
let tipIdx=new Date().getDate()%TIPS.length;

function save(){localStorage.setItem('rb-sake-food-v2',JSON.stringify(st));}
function load(){const d=localStorage.getItem('rb-sake-food-v2');if(d){st=JSON.parse(d);}else{st={done:{},checks:{}};}}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function nextTip(){tipIdx=(tipIdx+1)%TIPS.length;document.getElementById('tipTxt').textContent=TIPS[tipIdx];}

function getAllChapters(){const all=[];GENRES.forEach(g=>g.courses.forEach(c=>c.chapters.forEach(ch=>all.push({gid:g.id,cid:c.id,chid:ch.id,ch}))));return all;}
function getTotalChapters(){return getAllChapters().length;}
function getDoneChapters(){return Object.values(st.done||{}).filter(Boolean).length;}
function getDoneCourses(){let n=0;GENRES.forEach(g=>g.courses.forEach(c=>{if(c.chapters.every(ch=>st.done&&st.done[ch.id]))n++;}));return n;}
function getRank(pct){if(pct>=80)return'🥇';if(pct>=50)return'🥈';return'🥉';}

function renderHome(){
  load();
  const total=getTotalChapters(),done=getDoneChapters();
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stComp').textContent=done;
  document.getElementById('stPct').textContent=pct+'%';
  document.getElementById('stCr').textContent=getDoneCourses();
  document.getElementById('stBadge').textContent=getRank(pct);
  document.getElementById('tipTxt').textContent=TIPS[tipIdx];
  if(!curGenreId)curGenreId=GENRES[0].id;
  document.getElementById('genreTabs').innerHTML=GENRES.map(g=>'<div class="genre-tab'+(g.id===curGenreId?' active':'')+'" onclick="selectGenre(\''+g.id+'\')">'+g.emoji+' '+g.title+'</div>').join('');
  renderGenre(curGenreId);
  document.getElementById('hdrBack').style.display='none';
}

function selectGenre(gid){
  curGenreId=gid;
  document.querySelectorAll('.genre-tab').forEach(t=>t.classList.remove('active'));
  const idx=GENRES.findIndex(g=>g.id===gid);
  document.querySelectorAll('.genre-tab')[idx].classList.add('active');
  renderGenre(gid);
}

function renderGenre(gid){
  const genre=GENRES.find(g=>g.id===gid);if(!genre)return;
  const el=document.getElementById('genreContent');
  let html='<div class="genre-header"><h3>'+genre.emoji+' '+genre.title+'</h3><p>'+genre.desc+'</p></div>';
  html+=genre.courses.map(c=>{
    const tot=c.chapters.length,dn=c.chapters.filter(ch=>st.done&&st.done[ch.id]).length;
    const pct=tot?Math.round(dn/tot*100):0;
    return '<div class="course-card" id="card-'+c.id+'" onclick="toggleCourse(\''+c.id+'\')">'
      +'<div class="course-head"><div class="course-emoji">'+c.emoji+'</div>'
      +'<div class="course-info"><h4>'+c.title+'</h4><span class="badge '+c.badgeClass+'">'+c.level+'</span></div></div>'
      +'<div class="course-desc">'+c.desc+'</div>'
      +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="prog-lbl">'+dn+'/'+tot+' 講義完了</div>'
      +'<div class="chapters" id="chs-'+c.id+'">'
      +c.chapters.map(ch=>{
        const d2=st.done&&st.done[ch.id];
        const hasvid=ch.sections&&ch.sections.some(s=>s.t==='video');
        const hasmng=ch.sections&&ch.sections.some(s=>s.t==='manga');
        return '<div class="chapter-item" onclick="event.stopPropagation();openChapter(\''+gid+'\',\''+c.id+'\',\''+ch.id+'\')">'
          +'<div class="ch-check'+(d2?' done':'')+'">'+(d2?'✓':'')+'</div>'
          +'<div class="ch-title">'+ch.title+'</div>'
          +'<div class="ch-tags">'+(hasvid?'<span class="ch-tag video">動画</span>':'')+(hasmng?'<span class="ch-tag manga">漫画</span>':'')+'</div>'
          +'<div class="ch-dur">'+ch.duration+'</div></div>';
      }).join('')+'</div></div>';
  }).join('');
  el.innerHTML=html;
}

function toggleCourse(cid){const chs=document.getElementById('chs-'+cid);const card=document.getElementById('card-'+cid);const open=chs.classList.contains('open');chs.classList.toggle('open',!open);card.classList.toggle('open',!open);}
function goHome(){showScr('s1');renderHome();}

function openChapter(gid,cid,chid){
  load();
  const genre=GENRES.find(g=>g.id===gid);
  const course=genre&&genre.courses.find(c=>c.id===cid);
  const chapter=course&&course.chapters.find(ch=>ch.id===chid);
  if(!chapter)return;
  curLesson={gid,cid,chid,genre,course,chapter};
  const checks=(st.checks&&st.checks[chid])||{};
  let html='<div class="lesson-hdr"><h2>'+chapter.title+'</h2>'
    +'<div class="lesson-meta"><span>⏱ '+chapter.duration+'</span><span>📖 '+course.title+'</span></div></div>';
  chapter.sections.forEach((sec,si)=>{
    if(sec.t==='info'){html+='<div class="sb"><div class="info-box">ℹ️ '+sec.c+'</div></div>';}
    else if(sec.t==='video'){if(sec.url){html+='<div class="sb"><div class="video-slot"><iframe src="'+sec.url+'" allowfullscreen></iframe></div></div>';}else{html+='<div class="sb"><div class="video-ph"><div class="ph-icon">🎬</div><p>'+sec.label+'</p></div></div>';}}
    else if(sec.t==='manga'){if(sec.url){html+='<div class="sb"><div class="manga-slot"><img src="'+sec.url+'" alt="漫画解説"></div></div>';}else{html+='<div class="sb"><div class="manga-ph"><div class="ph-icon">🎨</div><p>'+sec.label+'</p></div></div>';}}
    else if(sec.t==='h'){html+='<div class="sb"><div class="sec-h">'+sec.c+'</div></div>';}
    else if(sec.t==='txt'){html+='<div class="sb"><div class="txt">'+sec.c+'</div></div>';}
    else if(sec.t==='hl'){html+='<div class="sb"><div class="hl-box"><div class="hl-title">⭐ '+sec.title+'</div><ul>'+sec.items.map(i=>'<li>'+i+'</li>').join('')+'</ul></div></div>';}
    else if(sec.t==='prac'){html+='<div class="sb"><div class="prac"><div class="prac-q">💭 考えてみよう：'+sec.q+'</div><button class="reveal-btn" onclick="revealAns('+si+')">解答例を見る</button><div class="prac-a" id="ans-'+si+'">'+sec.a+'</div></div></div>';}
    else if(sec.t==='glos'){html+='<div class="sb"><div class="glos"><div class="glos-title">📖 用語集</div>'+sec.terms.map(t=>'<div class="glos-term"><div class="term">'+t.term+'</div><div class="def">'+t.def+'</div></div>').join('')+'</div></div>';}
    else if(sec.t==='sum'){html+='<div class="sb"><div class="sum-box"><div class="sum-lbl">✅ まとめ</div><p>'+sec.c+'</p><div class="sum-next">→ '+sec.next+'</div></div></div>';}
  });
  html+='<div class="chk-list"><div class="chk-sec-title">📋 習得チェック</div>'+chapter.checkItems.map((item,i)=>{const chk=checks[i]||false;return '<div class="chk-item'+(chk?' done':'')+'" onclick="toggleCheck('+i+')" id="chk-'+i+'"><input type="checkbox"'+(chk?' checked':'')+' readonly> <div class="chk-label">'+item+'</div></div>';}).join('')+'</div>';
  const isDone=st.done&&st.done[chid];
  html+='<button class="comp-btn" id="compBtn" onclick="completeChapter()"'+(isDone?' disabled':'')+'>'+( isDone?'✅ 完了済み':'✅ この講義を完了する')+'</button>';
  const all=getAllChapters();const fi=all.findIndex(x=>x.chid===chid);
  html+='<div class="lesson-nav">';
  if(fi>0){const p=all[fi-1];html+='<button onclick="openChapter(\''+p.gid+'\',\''+p.cid+'\',\''+p.chid+'\')">← 前の講義</button>';}
  if(fi<all.length-1){const n=all[fi+1];html+='<button class="primary" onclick="openChapter(\''+n.gid+'\',\''+n.cid+'\',\''+n.chid+'\')">次の講義 →</button>';}
  html+='</div>';
  document.getElementById('lessonWrap').innerHTML=html;
  document.getElementById('hdrBack').style.display='block';
  showScr('s2');
}

function revealAns(si){const el=document.getElementById('ans-'+si);if(el)el.classList.add('shown');}
function toggleCheck(i){if(!curLesson)return;const id=curLesson.chid;if(!st.checks)st.checks={};if(!st.checks[id])st.checks[id]={};st.checks[id][i]=!st.checks[id][i];save();const el=document.getElementById('chk-'+i);if(el){el.classList.toggle('done',st.checks[id][i]);el.querySelector('input').checked=st.checks[id][i];}}
function completeChapter(){if(!curLesson)return;if(!st.done)st.done={};st.done[curLesson.chid]=true;save();showToast('講義完了！🍶');const btn=document.getElementById('compBtn');if(btn){btn.textContent='✅ 完了済み';btn.disabled=true;}}

function startQuiz(){quizIdx=0;quizScore=0;quizAnswered=false;document.getElementById('hdrBack').style.display='block';showScr('s3');renderQuiz();}
function renderQuiz(){
  const w=document.getElementById('quizWrap');
  if(quizIdx>=QUIZ_POOL.length){const pct=Math.round(quizScore/QUIZ_POOL.length*100);w.innerHTML='<div class="score-big"><div class="sn">'+quizScore+'/'+QUIZ_POOL.length+'</div><p>正解率 '+pct+'%'+(pct>=80?' — お酒博士！🍶':pct>=60?' — いい感じ！':' — 復習しよう')+'</p></div><button class="next-btn" onclick="startQuiz()">もう一度</button><button class="next-btn" style="margin-top:8px;background:#161b22;color:#F5C842;border:1px solid #F5C842" onclick="goHome()">ホームへ</button>';return;}
  const q=QUIZ_POOL[quizIdx];quizAnswered=false;
  w.innerHTML='<div class="q-prog">問題 '+(quizIdx+1)+'/'+QUIZ_POOL.length+' スコア: '+quizScore+'</div><div class="quiz-q-box">'+q.q+'</div><div class="qopt">'+q.opts.map((o,i)=>'<button onclick="ansQ('+i+')" id="qo'+i+'">'+o+'</button>').join('')+'</div><div class="q-result" id="qres"></div>';
}
function ansQ(i){if(quizAnswered)return;quizAnswered=true;const q=QUIZ_POOL[quizIdx];const ok=i===q.ans;if(ok)quizScore++;document.querySelectorAll('.qopt button').forEach((b,idx)=>{if(idx===q.ans)b.classList.add('correct');else if(idx===i&&!ok)b.classList.add('wrong');b.disabled=true;});const res=document.getElementById('qres');res.innerHTML=(ok?'✅ 正解！':'❌ 不正解...')+' '+q.exp+'<button class="next-btn" onclick="nxtQ()" style="margin-top:10px">次の問題 →</button>';res.classList.add('shown');}
function nxtQ(){quizIdx++;renderQuiz();}

load();renderHome();
</script>
</body>
</html>
